<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Исторический атлас Западной Сибири</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQWsd1J0oEG5wQHZA4C6PhX2HVEVrwM=" crossorigin=""/>
  <link rel="stylesheet" href="style.css?v=21" />
</head>
<body>
  <div id="app">
    <main id="mapWrap">
      <div id="map"></div>
      <div id="timelineBar" aria-label="Временная шкала">
        <div class="timeline-head"><span>Год</span><b id="timelineYearLabel">1914</b></div>
        <div id="yearTimeline" class="timeline-track"></div>
      </div>
    </main>

    <aside id="leftPanel" class="panel floating-panel">
      <div class="eyebrow">Дипломный веб-атлас · v21</div>
      <h1>Западная Сибирь: АТД и население</h1>
      <div class="year-card"><span>Выбранный год</span><b id="activeYearLabel">1914</b></div>

      <label class="control-label" for="modeSelect">Режим карты</label>
      <select id="modeSelect">
        <option value="admin_parent">Административная принадлежность</option>
        <option value="population">Население</option>
        <option value="density">Плотность населения</option>
        <option value="urban_share">Доля городского населения</option>
        <option value="rail_length">Длина ЖД внутри АТЕ</option>
        <option value="rail_density">Плотность ЖД</option>
        <option value="unit_type">Тип единицы</option>
      </select>

      <label class="control-label" for="themeSelect">Стиль интерфейса</label>
      <select id="themeSelect">
        <option value="light" selected>Светлый</option>
        <option value="dark">Тёмный</option>
      </select>

      <label class="control-label" for="toolSelect">Инструмент</label>
      <select id="toolSelect">
        <option value="pan" selected>Курсор / одиночный выбор</option>
        <option value="rectangle">Выбор прямоугольником</option>
        <option value="polygon">Выбор полигоном</option>
      </select>
      <div class="tool-button-row" aria-label="Инструменты карты">
        <button type="button" data-tool-button="pan" class="tool-btn active">Курсор</button>
        <button type="button" data-tool-button="rectangle" class="tool-btn">Рамка</button>
        <button type="button" data-tool-button="polygon" class="tool-btn">Полигон</button>
      </div>
      <div id="selectionToolHelp" class="tool-help">Курсор: кликайте по объектам для одиночной выборки. Карту можно двигать обычным перетаскиванием.</div>
      <div id="selectionDrawActions" class="button-row draw-actions" style="display:none">
        <button id="finishPolygon" type="button">Завершить полигон</button>
        <button id="cancelSelectionDraw" type="button">Отменить контур</button>
      </div>

      <div class="toggles">
        <label><input type="checkbox" id="toggleHydro" checked> Гидрография и океан</label>
        <label><input type="checkbox" id="toggleAdmin" checked> Административный слой</label>
        <label><input type="checkbox" id="toggleCenters" checked> Центры</label>
        <label><input type="checkbox" id="toggleRailways" checked> Железные дороги</label>
        <label><input type="checkbox" id="toggleCircles" checked> Круги населения</label>
      </div>

      <button id="resetView" type="button">Вернуть обзорный вид</button>
      <div class="button-row">
        <button id="clearSelection" type="button">Очистить выборку</button>
        <button id="selectAll" type="button">Выбрать всё</button>
      </div>

      <section class="stats" id="statsBox"></section>
      <button id="toggleAttributePanel" type="button">Структура атрибутов слоя</button>
      <section class="legend" id="legendBox"></section>
    </aside>

    <aside id="rightPanel" class="panel floating-panel">
      <h2>Объект</h2>
      <div id="featureInfo" class="feature-info muted"></div>
      <div id="selectionBox" class="feature-info muted"></div>
      <label class="control-label" for="selectedFeatureSelect" id="selectedFeatureSelectLabel" style="display:none">Перейти к выбранному объекту</label>
      <select id="selectedFeatureSelect" class="selected-feature-select" disabled style="display:none">
        <option value="">Нет выбранных объектов</option>
      </select>

      <h2 class="section-title">Статистика слоя / выборки</h2>
      <section class="stats right-stats" id="rightStatsBox"></section>
      <section class="feature-info group-analytics" id="groupAnalyticsBox"></section>

      <h2 class="section-title">Атрибуты слоя</h2>
      <div id="attributePanel" class="feature-info attr-panel muted">Нажмите кнопку «Структура атрибутов слоя» слева.</div>
    </aside>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js?v=21"></script>
</body>
</html>
